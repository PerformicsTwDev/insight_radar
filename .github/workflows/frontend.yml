name: frontend

# 獨立前端子專案（frontend/，T0.4）：僅在 frontend/** 或本 workflow 變動時跑（不拖累後端 jest/Testcontainers CI）。
# 後端 ci.yml 以 paths-ignore:['frontend/**'] 互補——純前端變更只跑此 workflow。
on:
  push:
    branches: [main]
    paths: ['frontend/**', '.github/workflows/frontend.yml']
  pull_request:
    branches: [main]
    paths: ['frontend/**', '.github/workflows/frontend.yml']

permissions:
  contents: read

concurrency:
  group: frontend-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

defaults:
  run:
    working-directory: frontend

jobs:
  # —— 第 1 段：lint / format / typecheck / build（單一 LTS）——
  quality:
    name: frontend · lint · typecheck · build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6 # pnpm 版本取自 packageManager（root 與 frontend 皆 9.15.0）
      - uses: actions/setup-node@v6
        with:
          node-version: 22.x
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint # eslint --max-warnings=0（禁用清單 + 硬化規則）
      - run: pnpm format:check # prettier --check
      # TC-38 drift（強化，T6.5）：兩道互補的契約漂移閘。
      #   1) openapi:check —— 對 ../openapi.json 重跑 codegen 與 committed schema.d.ts 無 diff（shape 漂移 → 紅）。
      #   2) openapi:lock-check —— committed src/api/openapi.version.json 鎖定的後端 info.version
      #      與 ../openapi.json 一致（version 漂移 → 紅）。openapi-typescript 會剝除 info.version，
      #      shape 相同但版本 bump 的契約變更靠此鎖擋下。
      # 註（刻意）：本 workflow 的 paths 不含 root openapi.json——後端契約 PR 只跑 ci.yml、不跑此 drift check，
      # 故後端契約變更後 frontend 產物可能短暫 stale（下個前端 PR 的 openapi:check / openapi:lock-check 會紅
      # → `pnpm openapi:gen` 一次 regen schema.d.ts + openapi.version.json 自癒）。
      # 這與 frontend spec 的「契約先行：OpenAPI diff 先合、frontend 隨後 adapt」工作流一致（非缺陷）。
      - run: pnpm openapi:check
      - run: pnpm openapi:lock-check
      - run: pnpm typecheck # tsc -b
      - run: pnpm build # tsc -b && vite build

  # —— 第 2 段：test + coverage gate（global ≥85%）+ ratchet vs main ——
  test:
    name: frontend · test + coverage
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read # coverage ratchet 需下載 main 的 coverage artifact
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22.x
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - name: Test + coverage gate (global ≥85%)
        run: pnpm test:cov # vitest --coverage；thresholds 於 vitest.config
      - name: Coverage summary → run summary
        if: ${{ always() }}
        run: |
          node -e '
            const fs = require("node:fs");
            const p = "coverage/coverage-summary.json";
            if (!fs.existsSync(p)) { console.log("no coverage-summary.json — skip"); process.exit(0); }
            const t = JSON.parse(fs.readFileSync(p, "utf8")).total;
            const row = (k) => `| ${k} | ${t[k].pct}% (${t[k].covered}/${t[k].total}) |`;
            const md = ["### Frontend coverage", "", "| metric | covered |", "| --- | --- |",
              row("statements"), row("branches"), row("functions"), row("lines"), ""].join("\n");
            fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, md + "\n");
          '
      # coverage ratchet（DevRules §11.5）：PR 覆蓋率不得低於 main 基準（容忍 0.1pp）。
      # 基準 = frontend workflow 在 main 最近一次成功 run 的 coverage artifact；缺失（首次/過期）→ 跳過、不假紅。
      - name: Coverage ratchet vs main baseline (PR only)
        if: ${{ github.event_name == 'pull_request' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          run_id=$(gh run list --repo "$GITHUB_REPOSITORY" --workflow frontend --branch main --status success --limit 1 --json databaseId --jq '.[0].databaseId // empty' || true)
          if [ -z "${run_id:-}" ]; then echo "::notice::frontend coverage ratchet: no successful main run found — skip"; exit 0; fi
          if ! gh run download "$run_id" --repo "$GITHUB_REPOSITORY" --name frontend-coverage --dir /tmp/base-fe-coverage 2>/dev/null; then
            echo "::notice::frontend coverage ratchet: baseline artifact unavailable (expired?) — skip"; exit 0
          fi
          node -e '
            const fs = require("node:fs");
            const base = JSON.parse(fs.readFileSync("/tmp/base-fe-coverage/coverage-summary.json", "utf8")).total;
            const cur = JSON.parse(fs.readFileSync("coverage/coverage-summary.json", "utf8")).total;
            const TOL = 0.1; let bad = false;
            for (const k of ["statements", "branches", "functions", "lines"]) {
              const drop = base[k].pct - cur[k].pct;
              console.log(`${k}: main ${base[k].pct}% -> pr ${cur[k].pct}% (${(-drop).toFixed(2)}pp)`);
              if (drop > TOL) { console.error(`::error::frontend coverage ratchet: ${k} dropped ${drop.toFixed(2)}pp (>${TOL}pp) vs main`); bad = true; }
            }
            process.exit(bad ? 1 : 0);
          '
      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        with:
          name: frontend-coverage
          path: frontend/coverage/
          retention-days: 7

  # —— 第 3 段：Playwright e2e + visual regression（pinned Docker image；closes #635）——
  # e2e（TC-43~48）與 visual（TC-49~54）共用 playwright.config.ts + 同一 pinned image；跨 OS/arch
  # 字型/次像素 AA 決定論靠釘版 image（見 .claude/rules/visual-regression.md §1）。visual 缺基準即紅
  # （rule §2；基準只由 visual-baseline.yml 於**同** image 以 --update-snapshots 生成後 commit，CI 不自動補）
  # ——故基準落地前此 job **預期紅**（正常）。image tag 必等 @playwright/test 版本（現 1.61.1 → v1.61.1-noble）。
  e2e:
    name: frontend · e2e + visual (playwright)
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.61.1-noble
    steps:
      - uses: actions/checkout@v7
      - name: Enable pnpm via corepack
        run: |
          corepack enable
          corepack prepare pnpm@9.15.0 --activate
      - run: pnpm install --frozen-lockfile
      # e2e project（TC-43~48）：production preview build + page.route stubs（無真後端，webServer 於 config）。
      - run: pnpm e2e
      # visual project（TC-49~54）：對 committed 基準逐像素比對（缺基準即紅，rule §2）。
      - run: pnpm e2e:visual
      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: frontend-playwright-report
          path: frontend/playwright-report/
          retention-days: 7
