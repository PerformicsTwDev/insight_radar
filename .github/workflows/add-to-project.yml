# 新 Issue/PR 自動加入 GitHub Project「insight_radar」(#4)。
# 需要 repo secret ADD_TO_PROJECT_PAT＝具 `repo`+`project` scope 的 PAT（PAT 放 Secret 框,不是 Name 框）。
name: Add issues/PRs to Project

on:
  issues:
    types: [opened]
  pull_request:
    types: [opened, reopened]
  workflow_dispatch: {}

jobs:
  add-to-project:
    runs-on: ubuntu-latest
    # Dependabot 觸發的 run 取得唯讀 token 且無法存取 repo secrets（含 ADD_TO_PROJECT_PAT），
    # 對 dependabot[bot] 跳過此 job，避免每個 Dependabot PR 都在此卡紅燈。
    # Dependabot PR 屬例行相依升級、非 Task 工作項，不需自動進專案看板。
    if: ${{ github.actor != 'dependabot[bot]' }}
    steps:
      - uses: actions/add-to-project@v2
        with:
          project-url: https://github.com/users/PerformicsTwDev/projects/4
          github-token: ${{ secrets.ADD_TO_PROJECT_PAT }}
