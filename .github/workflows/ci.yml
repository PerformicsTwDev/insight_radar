name: ci

on:
  pull_request:
    branches: [main]
    paths-ignore: ['frontend/**'] # 純前端變更只跑 frontend.yml，不觸發後端 jest/Testcontainers（T0.4）
  push:
    branches: [main]
    paths-ignore: ['frontend/**']

# 供應鏈最小權限（NFR-5）；個別 job 需要時才 elevate
permissions:
  contents: read

# 同一 PR 後續 push 取消前一輪，省 runner；main 分支不取消——
# 連續 squash merge 時 main 的紅燈 run 若被取消會吞掉 stop-the-line 訊號（DevRules §11.8）
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  NODE_ENV: test # 觸發 ConfigModule 載入 .env.test（假 env、外部 mock）
  CI: 'true'
  FORCE_COLOR: '1'

jobs:
  # （2026-07 移除 T0.1 前的 `guard: detect app` bootstrap 守門 job——package.json 恆存在後
  #   只剩每個 PR 一段串行延遲，無守門價值。）

  # —— 第 1 段：lint / typecheck / build（與 Node 版本無關，單一 LTS）——
  quality:
    name: lint · typecheck · build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6 # 須在 setup-node 前；pnpm 版本取自 package.json 的 "packageManager" 欄位
      - uses: actions/setup-node@v6
        with:
          node-version: 22.x
          cache: pnpm # 以 pnpm-lock.yaml hash 為 cache key
      - run: pnpm install --frozen-lockfile # 鎖檔、可重現（嚴禁 npm/yarn）
      - run: pnpm lint # eslint，0 error（T0.1 DoD）
      - run: pnpm format:check # prettier --check（可選）
      - run: pnpm typecheck # tsc -p tsconfig.json --noEmit
      - run: pnpm build # nest build（M0：build 必綠）
      - name: OpenAPI drift check（openapi.json 須與程式碼同步，FR-22）
        run: |
          pnpm openapi:generate
          git diff --exit-code openapi.json \
            || { echo "::error::openapi.json 過期——請本機跑 pnpm openapi:generate 並提交"; exit 1; }
      - name: Upload openapi.json artifact（前端 codegen 用）
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: openapi
          path: openapi.json
          retention-days: 7

  # —— 第 2/3 段：test + coverage gate（Node 矩陣；Testcontainers 需 Docker）——
  test:
    name: test (node ${{ matrix.node }})
    runs-on: ubuntu-latest # GitHub-hosted runner 內建 Docker daemon → Testcontainers OK
    permissions:
      contents: read
      actions: read # coverage ratchet 需下載 main 的 coverage artifact
    strategy:
      fail-fast: false
      matrix:
        node: ['22.x', '24.x'] # 政策：追兩條現役 LTS；EOL 即下架（Node 20 於 2026-04 EOL）
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # 一次跑 unit+integration+e2e（jest projects）並一次強制 coverageThreshold；
      # Testcontainers 在 globalSetup 起臨時 Postgres、跑 prisma migrate deploy、注入 DATABASE_URL。
      # ⚠ 嚴禁在此 workflow 的 env 寫死 DATABASE_URL，否則會 shadow 掉 Testcontainers 注入值。
      - name: Test + coverage gate (global ≥85% / core ≥90%)
        run: pnpm test:cov --ci --runInBand
      - name: Coverage summary → run summary（免下載 artifact 即可見；門檻失敗時也輸出）
        if: ${{ always() && matrix.node == '22.x' }}
        run: |
          node -e '
            const fs = require("node:fs");
            const p = "coverage/coverage-summary.json";
            if (!fs.existsSync(p)) { console.log("no coverage-summary.json — skip"); process.exit(0); }
            const t = JSON.parse(fs.readFileSync(p, "utf8")).total;
            const row = (k) => `| ${k} | ${t[k].pct}% (${t[k].covered}/${t[k].total}) |`;
            const md = ["### Coverage (node 22.x)", "", "| metric | covered |", "| --- | --- |",
              row("statements"), row("branches"), row("functions"), row("lines"), ""].join("\n");
            fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, md + "\n");
          '
      # coverage ratchet（DevRules §11.5）：PR 覆蓋率不得低於 main 基準（容忍 0.1pp）。
      # 基準 = main 最近一次成功 ci run 上傳的 coverage artifact；缺失（過期/首次）→ 跳過並註記，不假紅。
      - name: Coverage ratchet vs main baseline (PR only, node 22.x)
        if: ${{ github.event_name == 'pull_request' && matrix.node == '22.x' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          run_id=$(gh run list --repo "$GITHUB_REPOSITORY" --workflow ci --branch main --status success --limit 1 --json databaseId --jq '.[0].databaseId // empty' || true)
          if [ -z "${run_id:-}" ]; then echo "::notice::coverage ratchet: no successful main run found — skip"; exit 0; fi
          if ! gh run download "$run_id" --repo "$GITHUB_REPOSITORY" --name coverage --dir /tmp/base-coverage 2>/dev/null; then
            echo "::notice::coverage ratchet: baseline artifact unavailable (expired?) — skip"; exit 0
          fi
          node -e '
            const fs = require("node:fs");
            const base = JSON.parse(fs.readFileSync("/tmp/base-coverage/coverage-summary.json", "utf8")).total;
            const cur = JSON.parse(fs.readFileSync("coverage/coverage-summary.json", "utf8")).total;
            const TOL = 0.1; let bad = false;
            for (const k of ["statements", "branches", "functions", "lines"]) {
              const drop = base[k].pct - cur[k].pct;
              console.log(`${k}: main ${base[k].pct}% -> pr ${cur[k].pct}% (${(-drop).toFixed(2)}pp)`);
              if (drop > TOL) { console.error(`::error::coverage ratchet: ${k} dropped ${drop.toFixed(2)}pp (>${TOL}pp) vs main`); bad = true; }
            }
            process.exit(bad ? 1 : 0);
          '
      - name: Upload coverage report (single node，避免重複計數)
        if: ${{ matrix.node == '22.x' }}
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: coverage/
          retention-days: 7
