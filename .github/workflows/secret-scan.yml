# 祕密掃描閘門（NFR-5 / TC-29）。job id `secret-scan` 對映 DevelopmentRules §12.5 的
# required status check context；private repo 未授權 GHAS push protection 時，這是唯一能擋住
# 把祕密合進 main 的閘門，故設為「強制必過（非選用）」。
name: secret-scan

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: read # gitleaks-action 於 pull_request 事件需讀取 PR commit 範圍（否則 API 403）

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # gitleaks 需完整歷史才能掃 commit 範圍
      - uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
